<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Robinhood Portfolio Exporter</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <h1>Robinhood Exporter</h1>

    <section id="ready" hidden>
      <div class="actions">
        <button id="export-stocks" type="button">Export Stocks</button>
        <button id="export-crypto" type="button">Export Crypto</button>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
    </section>

    <section id="not-on-rh" hidden>
      <p class="status">
        Open your
        <a href="https://robinhood.com/account/investing" target="_blank" rel="noopener">Robinhood positions page</a>
        and sign in, then click the extension again.
      </p>
    </section>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
